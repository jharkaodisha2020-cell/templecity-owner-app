// ── Cloud save/load via Supabase ──────────────────────────────────────────────
async function cloudSave(collection, data){
  saveLocal("ll_"+collection, data);
  try{
    const { error } = await supabase.from("ll_data").upsert({
      key: collection,
      value: JSON.stringify(data),
      updated_at: new Date().toISOString()
    }, {onConflict:"key"});
    if(error) console.error("Supabase save error:", error);
  }catch(e){console.error("cloudSave:", e);}
}
async function cloudLoad(collection, def){
  const local = load("ll_"+collection, null);
  try{
    const { data, error } = await supabase.from("ll_data").select("value").eq("key", collection).single();
    if(error || !data) return local !== null ? local : def;
    const parsed = JSON.parse(data.value);
    saveLocal("ll_"+collection, parsed);
    return parsed;
  }catch(e){
    console.error("cloudLoad:", e);
    return local !== null ? local : def;
  }
}

// ── Toast ────────────────────────────────────────────────────────────────────
function Toast({t}){
  if(!t)return null;
  const c={success:["#f0fff4","#276749"],error:["#fff5f5","#c53030"]}[t.type]||["#ebf8ff","#2b6cb0"];
  return<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,padding:"12px 20px",borderRadius:10,background:c[0],color:c[1],fontWeight:700,fontSize:14,boxShadow:"0 4px 20px rgba(0,0,0,0.15)",whiteSpace:"nowrap",maxWidth:"90vw"}}>{t.type==="success"?"✅ ":"❌ "}{t.msg}</div>;
}

// ── Item Add Row ─────────────────────────────────────────────────────────────
function AddEqRow({eqList,accentColor,onAdd}){
  const [selId,setSelId]=useState("");
  const [qty,setQty]=useState(1);
  const [rate,setRate]=useState("");
  const [customName,setCustomName]=useState("");
  const IS={padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,outline:"none",background:"#fff",width:"100%"};
  const isOther=selId==="__other__";
  const accentCol=accentColor==="green"?"#065f46":"#7c3aed";
  function onSelChange(val){
    setSelId(val);
    if(val!=="__other__"){const eq=eqList.find(x=>x.id===val);if(eq?.rate)setRate(String(eq.rate));else setRate("");}
    else setRate("");
    setCustomName("");
  }
  function doAdd(){
    if(!selId)return;
    if(isOther&&!customName.trim())return;
    const eq=eqList.find(e=>e.id===selId);
    const r=Number(rate)||(eq?.rate||0);
    const q=Number(qty)||1;
    if(!r)return;
    const itemName=isOther?customName.trim():(eq?.name||selId);
    onAdd({equipmentId:isOther?"__other__:"+itemName:selId,qty:q,rate:r,amount:q*r,customName:isOther?itemName:undefined});
    setSelId("");setQty(1);setRate("");setCustomName("");
  }
  const cats=[...new Set(eqList.map(e=>e.cat))];
  const canAdd=selId&&rate&&(!isOther||customName.trim());
  return(
    <div style={{background:accentColor==="green"?"#f0fdf4":"#faf5ff",border:`1.5px solid ${accentColor==="green"?"#bbf7d0":"#e9d5ff"}`,borderRadius:10,padding:14,marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,color:accentCol,marginBottom:10}}>➕ Add Item</div>
      <div className="eq-add-grid" style={{display:"grid",gridTemplateColumns:"2fr 60px 100px auto",gap:8,alignItems:"flex-end"}}>
        <select value={selId} onChange={e=>onSelChange(e.target.value)} style={IS}>
          <option value="">— Equipment —</option>
          {cats.map(cat=>(
            <optgroup key={cat} label={cat}>
              {eqList.filter(e=>e.cat===cat).map(e=><option key={e.id} value={e.id}>{e.name}{e.rate?` — ${fmt(e.rate)}`:""}</option>)}
            </optgroup>
          ))}
          <optgroup label="──────────────">
            <option value="__other__">✏️ Other (Custom Item)</option>
          </optgroup>
        </select>
        <input type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)} placeholder="Qty" style={{...IS,textAlign:"center"}}/>
        <input type="number" value={rate} onChange={e=>setRate(e.target.value)} placeholder="Rate ₹" style={{...IS,textAlign:"right"}}/>
        <button onClick={doAdd} disabled={!canAdd} style={{padding:"8px 14px",background:canAdd?accentCol:"#a0aec0",color:"#fff",border:"none",borderRadius:8,cursor:canAdd?"pointer":"not-allowed",fontWeight:700,fontSize:13,height:38,whiteSpace:"nowrap"}}>Add</button>
      </div>
      {isOther&&(
        <div style={{marginTop:10}}>
          <input placeholder="Enter item name e.g. Smoke Machine, Extra Light…" value={customName} onChange={e=>setCustomName(e.target.value)} style={{...IS,width:"100%",border:`1.5px solid ${accentCol}`}}/>
          <div style={{fontSize:11,color:accentCol,marginTop:4}}>Type the item name, set qty &amp; price above, then tap Add</div>
        </div>
      )}
      {canAdd&&<div style={{marginTop:8,fontSize:12,fontWeight:600,color:accentCol}}>{qty} × {fmt(Number(rate))} = {fmt(Number(qty)*Number(rate))}</div>}
    </div>
  );
}

// ── Items Display Table ───────────────────────────────────────────────────────
function ItemsTable({items,eqList,accent,editable,onUpdate,onRemove}){
  if(!items.length)return null;
  const total=items.reduce((s,i)=>s+i.amount,0);
  const IS={padding:"3px 6px",border:"1.5px solid #e2e8f0",borderRadius:5,fontSize:12,outline:"none",fontFamily:"inherit"};
  return(
    <div style={{border:"1.5px solid #e2e8f0",borderRadius:10,overflow:"hidden",marginBottom:12}}>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:350}}>
          <thead><tr style={{background:"#f7fafc"}}>
            {["Item","Qty","Rate","Amt",""].map((h,i)=><th key={i} style={{padding:"8px 10px",fontSize:11,textTransform:"uppercase",letterSpacing:1,color:"#718096",textAlign:i===0?"left":"right",borderBottom:"1px solid #e2e8f0"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {items.map((item,idx)=>{
              const eq=eqList.find(e=>e.id===item.equipmentId);
              return(
                <tr key={idx} style={{borderBottom:"1px solid #f7fafc"}}>
                  <td style={{padding:"8px 10px",fontSize:13,fontWeight:600,color:"#1a202c"}}>{item.customName||eq?.name||item.equipmentId}</td>
                  <td style={{padding:"8px 10px",textAlign:"right"}}>
                    {editable?<input type="number" min="1" value={item.qty} onChange={e=>onUpdate(idx,"qty",e.target.value)} style={{...IS,width:44,textAlign:"center"}}/>:<span style={{fontSize:13}}>{item.qty}</span>}
                  </td>
                  <td style={{padding:"8px 10px",textAlign:"right"}}>
                    {editable?<input type="number" value={item.rate} onChange={e=>onUpdate(idx,"rate",e.target.value)} style={{...IS,width:75,textAlign:"right"}}/>:<span style={{fontSize:13,color:"#4a5568"}}>{fmt(item.rate)}</span>}
                  </td>
                  <td style={{padding:"8px 10px",textAlign:"right",fontSize:13,fontWeight:700,color:accent==="green"?"#065f46":"#7c3aed"}}>{fmt(item.amount)}</td>
                  <td style={{padding:"8px 10px",textAlign:"center"}}>
                    {editable&&<button onClick={()=>onRemove(idx)} style={{background:"#fff5f5",color:"#c53030",border:"1px solid #fed7d7",borderRadius:4,cursor:"pointer",padding:"2px 7px",fontSize:11}}>✕</button>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>

      <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:accent==="green"?"#f0fdf4":"#faf5ff",borderTop:`2px solid ${accent==="green"?"#bbf7d0":"#e9d5ff"}`}}>

        <span style={{fontWeight:800,fontSize:18,color:accent==="green"?"#065f46":"#7c3aed",fontFamily:"Georgia,serif"}}>{fmt(total)}</span>
      </div>
    </div>
  );
}

// ── Entry Form Modal ──────────────────────────────────────────────────────────
function EntryModal({type,contacts,editEntry,onSave,onClose,vendors}){
  const isIncome=type==="income";
  const eqList=isIncome?MY_EQ:VEN_EQ;
  const accent=isIncome?"green":"purple";
  const IS={padding:"9px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,outline:"none",color:"#1a202c",background:"#fff",width:"100%"};
  const contactKey=isIncome?"clientId":"vendorId";

  const [entry,setEntry]=useState(editEntry?JSON.parse(JSON.stringify(editEntry)):{
    id:genId(),[contactKey]:"",date:todayStr(),programme:"",location:"",items:[],notes:""
  });

  // Add equipment row state
  const [selEqId,setSelEqId]=useState("");
  const [selQty,setSelQty]=useState(1);
  const [selRate,setSelRate]=useState("");
  const [selSource,setSelSource]=useState("inhouse"); // inhouse | hire
  const [selVendorId,setSelVendorId]=useState("");
  const [customName,setCustomName]=useState("");
  const isOther=selEqId==="__other__";

  function onEqChange(id){
    setSelEqId(id);
    if(id!=="__other__"){const eq=eqList.find(e=>e.id===id);if(eq?.rate)setSelRate(String(eq.rate));}
    else setSelRate("");
    setCustomName("");setSelSource("inhouse");setSelVendorId("");
  }

  function addItem(){
    if(!selEqId||(isOther&&!customName.trim())||!selRate)return;
    if(isIncome&&selSource==="hire"&&!selVendorId)return;
    const eq=eqList.find(e=>e.id===selEqId);
    const qty=Number(selQty)||1,rate=Number(selRate)||0;
    const nm=isOther?customName.trim():(eq?.name||selEqId);
    const eid=isOther?"__other__:"+nm:selEqId;
    const item={
      equipmentId:eid,qty,rate,amount:qty*rate,
      customName:isOther?nm:undefined,
      source:isIncome?selSource:"hire",
      vendorId:isIncome&&selSource==="hire"?selVendorId:undefined,
    };
    const exists=entry.items.findIndex(i=>i.equipmentId===eid);
    const newItems=exists>=0
      ?entry.items.map((it,i)=>i===exists?{...it,qty:it.qty+qty,amount:(it.qty+qty)*it.rate}:it)
      :[...entry.items,item];
    setEntry(p=>({...p,items:newItems}));
    setSelEqId("");setSelQty(1);setSelRate("");setSelSource("inhouse");setSelVendorId("");setCustomName("");
  }

  function updateItem(idx,field,val){
    setEntry(p=>({...p,items:p.items.map((it,i)=>{if(i!==idx)return it;const n={...it,[field]:Number(val)||0};n.amount=n.qty*n.rate;return n;})}));
  }

  const hireItems=entry.items.filter(it=>it.source==="hire"&&it.vendorId);
  const hireVendors=[...new Set(hireItems.map(it=>it.vendorId))];
  const canSave=entry[contactKey]&&entry.items.length>0;
  const canAdd=selEqId&&selRate&&(!isOther||customName.trim())&&(!isIncome||selSource==="inhouse"||(selSource==="hire"&&selVendorId));
  const headerBg=isIncome?"linear-gradient(135deg,#0d1b2a,#1b4332)":"linear-gradient(135deg,#1a0533,#7c3aed)";
  const headerSub=isIncome?"#6ee7b7":"#c4b5fd";
  const cats=[...new Set(eqList.map(e=>e.cat))];

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:700,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:12,overflowY:"auto"}}>

            <div style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:700}}>{editEntry?"Edit":(isIncome?"New Client Job":"New Vendor Hire")}</div>

          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:18}}>×</button>
        </div>
        <div style={{padding:"18px 20px"}}>
          {/* Client/Vendor selector */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:700,color:"#4a5568",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>{isIncome?"Client *":"Vendor *"}</label>
            <select value={entry[contactKey]} onChange={e=>setEntry(p=>({...p,[contactKey]:e.target.value}))} style={IS}>
              <option value="">— Select —</option>
              {contacts.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          {/* Date / Programme / Location */}
          <div className="form-grid-3" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
            {[["date","Date","date"],["programme","Programme","text"],["location","Location","text"]].map(([k,ph,t])=>(
              <div key={k}>
                <label style={{fontSize:11,fontWeight:700,color:"#4a5568",display:"block",marginBottom:4,textTransform:"uppercase"}}>{ph}</label>
                <input type={t} value={entry[k]} onChange={e=>setEntry(p=>({...p,[k]:e.target.value}))} placeholder={t!=="date"?ph:""} style={IS}/>
              </div>
            ))}
          </div>

          {/* Add Equipment with Hire/Inhouse */}
          <div style={{background:isIncome?"#f0fdf4":"#faf5ff",border:`1.5px solid ${isIncome?"#bbf7d0":"#e9d5ff"}`,borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:isIncome?"#065f46":"#7c3aed",marginBottom:10}}>➕ Add Equipment</div>

            {/* Equipment select */}

                    {eqList.filter(e=>e.cat===cat).map(e=><option key={e.id} value={e.id}>{e.name}{e.rate?` — ${fmt(e.rate)}/day`:""}</option>)}
                  </optgroup>
                ))}
                <optgroup label="──────────────">
                  <option value="__other__">✏️ Other (Custom Item)</option>

// ── Month Summary PDF ─────────────────────────────────────────────────────────
function generateMonthlySummaryPDF(clients, jobs, payments, cDues, month){
  const fmt=n=>`₹${Number(n||0).toLocaleString("en-IN")}`;
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const d=new Date(month+"-01");
  const mLabel=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  const mJobs=jobs.filter(j=>j.date.startsWith(month));
  let rows="";
  let grandTotal=0, grandPaid=0, grandBalance=0;
  clients.forEach(c=>{
    const cj=mJobs.filter(j=>j.clientId===c.id);
    const amt=cj.reduce((s,j)=>s+j.items.reduce((a,i)=>a+i.amount,0),0);
    const prev=cDues[c.id]||0;
    const paid=(payments||[]).filter(p=>p.contactId===c.id&&p.date.startsWith(month)).reduce((s,p)=>s+p.amount,0);
    const balance=amt+prev-paid;
    if(!amt&&!prev) return;
    grandTotal+=amt+prev; grandPaid+=paid; grandBalance+=balance;
    rows+=`<tr style="border-bottom:1px solid #f0f0f0;">
      <td style="padding:11px 14px;font-weight:600;color:#1a202c;">${c.name}</td>
      <td style="padding:11px 14px;text-align:center;color:#718096;">${cj.length}</td>

// ── PDF Generator ────────────────────────────────────────────────────────────────
function generatePDF(contact, jobs, prevDue, totalPaid, balance, month){
  const d=new Date(month+"-01");
  const mLabel=`${["January","February","March","April","May","June","July","August","September","October","November","December"][d.getMonth()]} ${d.getFullYear()}`;
  const fmtD=s=>{if(!s)return"";const dt=new Date(s);return`${dt.getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][dt.getMonth()]} ${dt.getFullYear()}`;};
  const fmt=n=>`₹${Number(n||0).toLocaleString("en-IN")}`;

  let jobsHTML="";

    const jobTotal=job.items.reduce((s,i)=>s+i.amount,0);

      rowsHTML+=`<tr><td style="padding:8px 12px;border-bottom:1px solid #f0f0f0;">${name}</td><td style="padding:8px 12px;text-align:right;border-bottom:1px solid #f0f0f0;">${item.qty}</td><td style="padding:8px 12px;text-align:right;border-bottom:1px solid #f0f0f0;">${fmt(item.rate)}</td><td style="padding:8px 12px;text-align:right;border-bottom:1px solid #f0f0f0;font-weight:700;color:#065f46;">${fmt(item.amount)}</td></tr>`;
    });
    jobsHTML+=`
      <div style="margin-bottom:20px;border:1.5px solid #e2e8f0;border-radius:10px;overflow:hidden;">
        <div style="background:#f0fdf4;padding:10px 14px;display:flex;justify-content:space-between;">
          <div style="font-size:13px;">
            <strong>📅 ${fmtD(job.date)}</strong>
            ${job.programme?`&nbsp;·&nbsp;🎬 ${job.programme}`:""}
            ${job.location?`&nbsp;·&nbsp;📍 ${job.location}`:""}
          </div>
          <strong style="color:#065f46;">${fmt(jobTotal)}</strong>
        </div>
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr style="background:#fafafa;">
            <th style="padding:7px 12px;text-align:left;font-size:11px;color:#718096;text-transform:uppercase;">Equipment</th>
            <th style="padding:7px 12px;text-align:right;font-size:11px;color:#718096;text-transform:uppercase;">Qty</th>
            <th style="padding:7px 12px;text-align:right;font-size:11px;color:#718096;text-transform:uppercase;">Rate</th>
            <th style="padding:7px 12px;text-align:right;font-size:11px;color:#718096;text-transform:uppercase;">Amount</th>
          </tr></thead>
          <tbody>${rowsHTML}</tbody>
        </table>
        ${job.notes?`<div style="padding:7px 12px;background:#fafafa;font-size:12px;color:#718096;">📝 ${job.notes}</div>`:""}
      </div>`;
  });

  const monthTotal=jobs.reduce((s,j)=>s+j.items.reduce((a,i)=>a+i.amount,0),0);

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <title>Invoice - ${contact.name} - ${mLabel}</title>
  <style>
    body{font-family:'Segoe UI',sans-serif;margin:0;padding:0;background:#fff;}
    @media print{body{margin:0;} .no-print{display:none;}}
  </style></head><body>
  <div style="max-width:700px;margin:0 auto;padding:30px 20px;">
    <!-- Header -->
    <div style="background:linear-gradient(135deg,#0d1b2a,#1b4332);padding:28px 32px;border-radius:14px;color:#fff;margin-bottom:24px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-family:Georgia,serif;font-size:32px;font-weight:700;">INVOICE</div>
          <div style="font-size:11px;color:#6ee7b7;letter-spacing:3px;margin-top:4px;text-transform:uppercase;">Templecity Entertainment</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:12px;color:#a7f3d0;">Bill Period</div>
          <div style="font-size:20px;font-weight:700;margin-top:2px;">${mLabel}</div>
        </div>
      </div>
      <div style="margin-top:18px;padding:14px 18px;background:rgba(255,255,255,0.1);border-radius:10px;">
        <div style="font-size:10px;color:#6ee7b7;letter-spacing:2px;text-transform:uppercase;">Billed To</div>
        <div style="font-size:20px;font-weight:700;margin-top:4px;">${contact.name}</div>
        <div style="font-size:13px;color:#a7f3d0;">${contact.email||""}${contact.phone?" · "+contact.phone:""}</div>
      </div>
    </div>
    <!-- Jobs -->
    ${jobsHTML}
    <!-- Totals -->
    <div style="border:1.5px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-top:16px;">
      <div style="display:flex;justify-content:space-between;padding:12px 16px;background:#f7fafc;border-bottom:1px solid #e2e8f0;">
        <span style="font-size:14px;font-weight:600;color:#4a5568;">Current Month Total</span>
        <span style="font-size:15px;font-weight:700;">${fmt(monthTotal)}</span>

      ${totalPaid>0?`<div style="display:flex;justify-content:space-between;padding:12px 16px;background:#f0fdf4;border-bottom:1px solid #e2e8f0;">
        <span style="font-size:14px;font-weight:600;color:#065f46;">✅ Less: Payments Received</span>
        <span style="font-size:14px;font-weight:700;color:#065f46;">− ${fmt(totalPaid)}</span>
      </div>`:""}
      ${prevDue>0?`<div style="display:flex;justify-content:space-between;padding:12px 16px;background:#fffbeb;border-bottom:1px solid #fde68a;">
        <span style="font-size:14px;font-weight:600;color:#92400e;">⏳ Previous Due</span>
        <span style="font-size:14px;font-weight:700;color:#c05621;">${fmt(prevDue)}</span>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 16px;background:linear-gradient(135deg,#0d1b2a,#1b4332);">
        <span style="font-size:17px;font-weight:700;color:#fff;">Balance Due</span>
        <span style="font-size:30px;font-weight:800;color:${balance<=0?"#6ee7b7":"#6ee7b7"};font-family:Georgia,serif;">${balance<=0?"✅ Cleared":fmt(balance)}</span>
      </div>
    </div>
    <div style="margin-top:24px;text-align:center;font-size:12px;color:#a0aec0;">Generated by Templecity Entertainment Rental Manager</div>
  </div>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`;

  const blob=new Blob([html],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`Invoice_${contact.name.replace(/\s+/g,"_")}_${month}.html`;
  a.click();

}

// ── Bill / Statement Modal ────────────────────────────────────────────────────
function BillModal({type,contact,entries,prevDues,onSavePrevDue,month,onClose,payments,onAddPayment,onDelPayment,advances,onAddAdvance,onDelAdvance,vendorPays,onAddVendorPay,onDelVendorPay}){
  const isIncome=type==="income";
  const eqList=isIncome?MY_EQ:VEN_EQ;
  const accent=isIncome?"green":"purple";
  const contactKey=isIncome?"clientId":"vendorId";
  const me=entries.filter(e=>e[contactKey]===contact.id&&e.date.startsWith(month));
  const mTotal=me.reduce((s,e)=>s+e.items.reduce((a,i)=>a+i.amount,0),0);
  const prevDue=prevDues[contact.id]||0;
  const [editPrev,setEditPrev]=useState(false);
  const [prevInput,setPrevInput]=useState(String(prevDue));

  // Payment / Advance state
  const [showPayForm,setShowPayForm]=useState(false);
  const [payDate,setPayDate]=useState(todayStr());
  const [payAmt,setPayAmt]=useState("");
  const [payNote,setPayNote]=useState("");
  // Vendor payment state
  const [showVPayForm,setShowVPayForm]=useState(false);
  const [vPayDate,setVPayDate]=useState(todayStr());
  const [vPayAmt,setVPayAmt]=useState("");
  const [vPayNote,setVPayNote]=useState("");

  // Filter payments/advances for this contact this month
  const mPayments=(payments||[]).filter(p=>p.contactId===contact.id&&p.date.startsWith(month));
  const mAdvances=(advances||[]).filter(a=>a.contactId===contact.id&&a.date.startsWith(month));
  const mVendorPays=(vendorPays||[]).filter(p=>p.contactId===contact.id&&p.date.startsWith(month));
  const totalPaid=mPayments.reduce((s,p)=>s+p.amount,0);
  const totalAdv=mAdvances.reduce((s,a)=>s+a.amount,0);
  const totalVendorPaid=mVendorPays.reduce((s,p)=>s+p.amount,0);

  const grand=mTotal+Number(prevInput||0)-(isIncome?totalPaid:(totalAdv+totalVendorPaid));
  const headerBg=isIncome?"linear-gradient(135deg,#0d1b2a,#1b4332)":"linear-gradient(135deg,#1a0533,#7c3aed)";
  const accentColor=isIncome?"#6ee7b7":"#c4b5fd";

  function addTransaction(){
    if(!payAmt)return;
    const entry={id:genId(),contactId:contact.id,date:payDate,amount:Number(payAmt),note:payNote};
    if(isIncome) onAddPayment(entry);
    else onAddAdvance(entry);
    setPayAmt("");setPayNote("");setPayDate(todayStr());setShowPayForm(false);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:12,overflowY:"auto"}}>
      <div className="modal-inner" style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:700,boxShadow:"0 30px 70px rgba(0,0,0,0.4)",margin:"12px auto 70px",overflow:"hidden"}}>
        <div style={{background:headerBg,padding:"22px 28px",color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontFamily:"Georgia,serif",fontSize:28,fontWeight:700}}>{isIncome?"INVOICE":"STATEMENT"}</div>
              <div style={{fontSize:11,color:accentColor,letterSpacing:2.5,marginTop:3,textTransform:"uppercase"}}>{isIncome?"Equipment Rental — Client Bill":"Vendor Expense — I Owe"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:isIncome?"#a7f3d0":"#ddd6fe"}}>Period</div>
              <div style={{fontSize:18,fontWeight:700,marginTop:1}}>{mLabel(month)}</div>
            </div>
          </div>
          <div style={{marginTop:16,padding:"12px 16px",background:"rgba(255,255,255,0.09)",borderRadius:10}}>
            <div style={{fontSize:10,color:accentColor,letterSpacing:2,textTransform:"uppercase"}}>{isIncome?"Billed To":"Pay To"}</div>
            <div style={{fontSize:18,fontWeight:700,marginTop:3}}>{contact.name}</div>
            <div style={{fontSize:13,color:isIncome?"#a7f3d0":"#ddd6fe"}}>{contact.email||""}{contact.phone&&` · ${contact.phone}`}</div>
          </div>
        </div>

        <div style={{padding:"20px 24px",maxHeight:"50vh",overflowY:"auto"}}>
          {me.length===0&&<div style={{textAlign:"center",padding:32,color:"#a0aec0"}}>No entries this month</div>}
          {me.map(entry=>{
            const entryAmt=entry.items.reduce((s,i)=>s+i.amount,0);
            return(
              <div key={entry.id} style={{marginBottom:14,border:`1.5px solid ${isIncome?"#e2e8f0":"#e9d5ff"}`,borderRadius:10,overflow:"hidden"}}>
                <div style={{background:isIncome?"#f0fdf4":"#faf5ff",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6,borderBottom:`1px solid ${isIncome?"#bbf7d0":"#e9d5ff"}`}}>

                    {entry.programme&&<span style={{fontWeight:600,color:"#1a202c"}}>🎬 {entry.programme}</span>}
                    {entry.location&&<span style={{color:"#4a5568"}}>📍 {entry.location}</span>}
                  </div>
                  <span style={{fontSize:15,fontWeight:800,color:isIncome?"#065f46":"#7c3aed",fontFamily:"Georgia,serif"}}>{fmt(entryAmt)}</span>

          <div style={{border:`1.5px solid ${isIncome?"#bbf7d0":"#e9d5ff"}`,borderRadius:10,overflow:"hidden",marginTop:10,marginBottom:6}}>

                    </div>
                  </div>
                  <input value={vPayNote} onChange={e=>setVPayNote(e.target.value)} placeholder="Note e.g. Paid via UPI, Cash…" style={{padding:"7px 10px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:13,outline:"none",width:"100%",marginBottom:8}}/>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{
                      if(!vPayAmt)return;
                      onAddVendorPay({id:genId(),contactId:contact.id,date:vPayDate,amount:Number(vPayAmt),note:vPayNote});
                      setVPayAmt("");setVPayNote("");setVPayDate(todayStr());setShowVPayForm(false);
                    }} disabled={!vPayAmt} style={{flex:1,padding:"8px",background:vPayAmt?"#065f46":"#a0aec0",color:"#fff",border:"none",borderRadius:7,cursor:vPayAmt?"pointer":"not-allowed",fontSize:13,fontWeight:700}}>Save Payment</button>
                    <button onClick={()=>setShowVPayForm(false)} style={{padding:"8px 14px",background:"#e2e8f0",color:"#4a5568",border:"none",borderRadius:7,cursor:"pointer",fontSize:13}}>✕</button>
                  </div>
                </div>
              )}
              {mVendorPays.length===0
                ?<div style={{padding:"12px 16px",fontSize:13,color:"#a0aec0",textAlign:"center"}}>No payments made this month</div>
                :mVendorPays.map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 16px",borderBottom:"1px solid #f7fafc"}}>
                    <div>
                      <span style={{fontSize:13,fontWeight:700,color:"#1a202c"}}>📅 {fmtD(p.date)}</span>
                      {p.note&&<span style={{fontSize:12,color:"#718096",marginLeft:8}}>{p.note}</span>}
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{fontWeight:700,color:"#065f46",fontSize:14}}>{fmt(p.amount)}</span>
                      <button onClick={()=>onDelVendorPay(p.id)} style={{padding:"2px 8px",background:"#fff5f5",color:"#c53030",border:"1px solid #fed7d7",borderRadius:5,cursor:"pointer",fontSize:11}}>✕</button>
                    </div>
                  </div>
                ))
              }
              {mVendorPays.length>0&&(
                <div style={{display:"flex",justifyContent:"space-between",padding:"9px 16px",background:"#f0fdf4"}}>
                  <span style={{fontSize:13,fontWeight:600,color:"#065f46"}}>Total Paid</span>
                  <span style={{fontWeight:800,color:"#065f46",fontSize:15}}>{fmt(totalVendorPaid)}</span>
                </div>
              )}
            </div>
          )}

          {/* Totals */}
          <div style={{border:"1.5px solid #e2e8f0",borderRadius:10,overflow:"hidden",marginTop:6}}>
            <div style={{display:"flex",justifyContent:"space-between",padding:"12px 16px",background:"#f7fafc",borderBottom:"1px solid #e2e8f0"}}>
              <span style={{fontSize:14,fontWeight:600,color:"#4a5568"}}>Current Month Total</span>
              <span style={{fontSize:15,fontWeight:700,color:"#1a202c"}}>{fmt(mTotal)}</span>
            </div>
            {(isIncome?totalPaid:totalAdv)>0&&(
              <div style={{display:"flex",justifyContent:"space-between",padding:"12px 16px",background:"#f0fdf4",borderBottom:"1px solid #e2e8f0"}}>
                <span style={{fontSize:14,fontWeight:600,color:"#065f46"}}>{isIncome?"✅ Less: Payments Received":"✅ Less: Advances Given"}</span>
                <span style={{fontSize:14,fontWeight:700,color:"#065f46"}}>− {fmt(isIncome?totalPaid:totalAdv)}</span>
              </div>
            )}
            {!isIncome&&totalVendorPaid>0&&(
              <div style={{display:"flex",justifyContent:"space-between",padding:"12px 16px",background:"#f0fdf4",borderBottom:"1px solid #e2e8f0"}}>
                <span style={{fontSize:14,fontWeight:600,color:"#065f46"}}>✅ Less: Payments Made</span>
                <span style={{fontSize:14,fontWeight:700,color:"#065f46"}}>− {fmt(totalVendorPaid)}</span>
              </div>
            )}
            {/* Previous Due - Full section with custom entry */}
            <div style={{border:"1.5px solid #fde68a",borderRadius:10,overflow:"hidden",marginTop:8,marginBottom:6}}>
              <div style={{background:"#fffbeb",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #fde68a"}}>
                <div>
                  <span style={{fontSize:13,fontWeight:700,color:"#92400e"}}>⏳ Previous Due</span>
                  <div style={{fontSize:11,color:"#c05621",marginTop:1}}>Carried from last month or added manually</div>
                </div>
                <button onClick={()=>setEditPrev(p=>!p)} style={{padding:"4px 12px",background:"#c05621",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700}}>
                  {editPrev?"✕ Cancel":"✏️ Edit / Set Custom"}
                </button>
              </div>
              {editPrev&&(
                <div style={{padding:"12px 16px",background:"#fff",borderBottom:"1px solid #fde68a"}}>
                  <div style={{fontSize:12,color:"#718096",marginBottom:8}}>
                    Enter the previous due amount manually — this will be added to the current month bill
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:11,fontWeight:700,color:"#92400e",display:"block",marginBottom:4,textTransform:"uppercase"}}>Previous Due Amount ₹</label>
                      <input type="number" value={prevInput} onChange={e=>setPrevInput(e.target.value)}
                        placeholder="Enter amount e.g. 15000"
                        style={{width:"100%",padding:"9px 12px",border:"1.5px solid #f6ad55",borderRadius:8,fontSize:15,textAlign:"right",outline:"none",fontFamily:"inherit",fontWeight:700}}/>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6,paddingTop:18}}>
                      <button onClick={()=>{onSavePrevDue(contact.id,Number(prevInput)||0);setEditPrev(false);}}
                        style={{padding:"9px 18px",background:"#c05621",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>
                        Save
                      </button>
                      <button onClick={()=>{setPrevInput("0");onSavePrevDue(contact.id,0);setEditPrev(false);}}
                        style={{padding:"9px 18px",background:"#e2e8f0",color:"#4a5568",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                        Clear
                      </button>
                    </div>
                  </div>
                  {prevInput&&Number(prevInput)>0&&(
                    <div style={{marginTop:8,padding:"8px 12px",background:"#fef3c7",borderRadius:7,fontSize:13,color:"#92400e",fontWeight:600}}>
                      ₹{Number(prevInput).toLocaleString("en-IN")} will be added to this month's bill
                    </div>
                  )}
                </div>
              )}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",background:prevDue>0?"#fffbeb":"#fafafa"}}>
                <span style={{fontSize:13,color:"#4a5568"}}>Current Previous Due</span>
                <span style={{fontSize:18,fontWeight:800,color:prevDue>0?"#c05621":"#a0aec0",fontFamily:"Georgia,serif"}}>{prevDue>0?fmt(prevDue):"₹0 — No dues"}</span>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px",background:headerBg}}>
              <span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{isIncome?"Balance Due":"Balance to Pay"}</span>
              <span style={{fontSize:28,fontWeight:800,color:grand<=0?"#6ee7b7":accentColor,fontFamily:"Georgia,serif"}}>{grand<=0?"✅ Cleared":fmt(grand)}</span>
            </div>
            {/* Carry to next month */}
            {grand>0&&(
              <div style={{padding:"12px 16px",background:"linear-gradient(135deg,#fffbeb,#fef3c7)",borderTop:"1px solid #fde68a",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#92400e"}}>⏭️ Carry Balance to Next Month?</div>
                  <div style={{fontSize:12,color:"#c05621",marginTop:2}}>
                    Remaining <strong>{fmt(grand)}</strong> will appear as Previous Due next month
                  </div>
                </div>
                <button onClick={()=>{
                  onSavePrevDue(contact.id, grand);
                  setEditPrev(false);
                  setPrevInput(String(grand));
                  alert("✅ "+fmt(grand)+" set as previous due for next month!");
                }} style={{padding:"9px 18px",background:"linear-gradient(135deg,#c05621,#92400e)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                  ⏭️ Carry to Next Month
                </button>
              </div>
            )}
            {grand<=0&&(
              <div style={{padding:"10px 16px",background:"#f0fdf4",borderTop:"1px solid #bbf7d0",textAlign:"center"}}>
                <span style={{fontSize:13,fontWeight:700,color:"#065f46"}}>✅ All settled — No balance to carry!</span>
              </div>
            )}
          </div>
        </div>

        <div style={{padding:"14px 24px",display:"flex",gap:10,justifyContent:"flex-end",borderTop:"1px solid #f0f0f0",flexWrap:"wrap"}}>
          <button onClick={onClose} style={{padding:"10px 18px",border:"2px solid #e2e8f0",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:14,fontWeight:500,color:"#4a5568"}}>Close</button>
          <button onClick={()=>window.print()} style={{padding:"10px 20px",background:"#4a5568",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:700}}>🖨️ Print</button>
          {isIncome&&<button onClick={()=>generatePDF(contact,me,prevDue,totalPaid,grand,month)} style={{padding:"10px 20px",background:headerBg,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:700}}>📄 Download PDF</button>}
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]           = useState("dashboard");
  const [clients,setClients]     = useState(()=>load("ll_clients",[]));
  const [vendors,setVendors]     = useState(()=>load("ll_vendors",[]));
  const [jobs,setJobs]           = useState(()=>load("ll_jobs",[]));
  const [hires,setHires]         = useState(()=>load("ll_hires",[]));
  const [cDues,setCDues]         = useState(()=>load("ll_cDues",{}));
  const [vDues,setVDues]         = useState(()=>load("ll_vDues",{}));
  const [payments,setPayments]       = useState(()=>load("ll_payments",[]));   // client payments received
  const [advances,setAdvances]       = useState(()=>load("ll_advances",[]));   // vendor advances given
  const [vendorPays,setVendorPays]   = useState(()=>load("ll_vendorPays",[])); // payments made to vendors
  const [cloudStatus,setCloudStatus] = useState("local");
  const [dataLoaded,setDataLoaded]   = useState(false);

  // Load from cloud on startup
  useEffect(()=>{
    if(!FIREBASE_READY){ setDataLoaded(true); return; }
    setCloudStatus("syncing");
    Promise.all([
      cloudLoad("clients",[]),
      cloudLoad("vendors",[]),
      cloudLoad("jobs",[]),
      cloudLoad("hires",[]),
      cloudLoad("cDues",{}),
      cloudLoad("vDues",{}),
      cloudLoad("payments",[]),
      cloudLoad("advances",[]),
      cloudLoad("vendorPays",[]),
    ]).then(([cl,ve,jo,hi,cd,vd,py,av,vp])=>{
      setClients(cl); setVendors(ve); setJobs(jo);
      setHires(hi); setCDues(cd); setVDues(vd);
      setPayments(py); setAdvances(av); setVendorPays(vp);
      setCloudStatus("synced"); setDataLoaded(true);
      // Check for new staff entries after initial load
      const staffJobs=jo.filter(j=>j.addedBy==="member");
      if(staffJobs.length>lastSeenJobs){
        setNewStaffCount(staffJobs.length-lastSeenJobs);
        setShowStaffBanner(true);
      }
    }).catch(()=>{ setCloudStatus("error"); setDataLoaded(true); });

    // Real-time subscription — detect new staff entries
    if(typeof supabase !== "undefined"){
      const channel = supabase
        .channel("jobs-changes")
        .on("postgres_changes", {event:"UPDATE", schema:"public", table:"ll_data", filter:"key=eq.jobs"},
          async (payload)=>{
            try{
              const newJobs = JSON.parse(payload.new.value);
              setJobs(newJobs);
              saveLocal("ll_jobs", newJobs);
              const staffJobs = newJobs.filter(j=>j.addedBy==="member");
              const stored = Number(localStorage.getItem("ll_lastSeenJobs")||0);
              if(staffJobs.length > stored){
                setNewStaffCount(staffJobs.length - stored);
                setShowStaffBanner(true);
              }
            }catch(e){console.error("Realtime parse error:",e);}
          }
        ).subscribe();
      return ()=>supabase.removeChannel(channel);
    }
  },[]);
  const [selMonth,setSelMonth]   = useState(curMonth);
  const [modal,setModal]         = useState(null); // {type,entry?}
  const [billModal,setBillModal] = useState(null); // {type,contact}
  const [toast,setToast]         = useState(null);
  const [reportType,setReportType] = useState("client");
  const [lastSeenJobs,setLastSeenJobs] = useState(()=>{ try{return Number(localStorage.getItem("ll_lastSeenJobs")||0);}catch{return 0;} });
  const [newStaffCount,setNewStaffCount] = useState(0);
  const [showStaffBanner,setShowStaffBanner] = useState(false);
  const [newC,setNewC]           = useState({name:"",email:"",phone:""});
  const [newV,setNewV]           = useState({name:"",email:"",phone:""});

  useEffect(()=>{ if(!dataLoaded)return; cloudSave("clients",clients); },[clients]);
  useEffect(()=>{ if(!dataLoaded)return; cloudSave("vendors",vendors); },[vendors]);
  useEffect(()=>{ if(!dataLoaded)return; cloudSave("jobs",jobs); },[jobs]);
  useEffect(()=>{ if(!dataLoaded)return; cloudSave("hires",hires); },[hires]);
  useEffect(()=>{ if(!dataLoaded)return; cloudSave("cDues",cDues); },[cDues]);
  useEffect(()=>{ if(!dataLoaded)return; cloudSave("vDues",vDues); },[vDues]);
  useEffect(()=>{ if(!dataLoaded)return; cloudSave("payments",payments); },[payments]);
  useEffect(()=>{ if(!dataLoaded)return; cloudSave("advances",advances); },[advances]);
  useEffect(()=>{ if(!dataLoaded)return; cloudSave("vendorPays",vendorPays); },[vendorPays]);

  function showToast(msg,type="success"){setToast({msg,type});setTimeout(()=>setToast(null),2800);}

  function addContact(type){
    if(type==="client"){
      if(!newC.name.trim())return showToast("Name required","error");
      setClients(p=>[...p,{...newC,id:genId()}]);
      setNewC({name:"",email:"",phone:""});showToast("Client added!");
    } else {
      if(!newV.name.trim())return showToast("Name required","error");
      setVendors(p=>[...p,{...newV,id:genId()}]);
      setNewV({name:"",email:"",phone:""});showToast("Vendor added!");
    }
  }

  function saveEntry(type,entry){
    if(type==="income"){
      const editing=modal.entry;
      const newJob={...entry,id:editing?entry.id:genId()};
      const updatedJobs=editing?jobs.map(j=>j.id===newJob.id?newJob:j):[...jobs,newJob];
      setJobs(updatedJobs);
      cloudSave("jobs",updatedJobs);

      // ── Auto-create/update vendor hire entries for hired items ──
      const hireItems=entry.items.filter(it=>it.source==="hire"&&it.vendorId);

      // Group hired items by vendor
      const byVendor={};
      hireItems.forEach(it=>{
        if(!byVendor[it.vendorId])byVendor[it.vendorId]=[];
        byVendor[it.vendorId].push({...it,source:undefined,vendorId:undefined});
      });

      // Start with existing hires, remove any previously auto-created for this job
      let updatedHires=hires.filter(h=>h.sourceJobId!==newJob.id);

      // Add new auto hire entries for each vendor
      if(Object.keys(byVendor).length>0){
        Object.entries(byVendor).forEach(([vendorId,items])=>{
          updatedHires.push({
            id:genId(),
            vendorId,
            date:entry.date,
            programme:entry.programme,
            location:entry.location,
            items,
            notes:`Auto from job: ${entry.programme||entry.date}`,
            autoCreated:true,
            sourceJobId:newJob.id,
          });
        });
        setHires(updatedHires);
        cloudSave("hires",updatedHires);
        const action=editing?"Updated":"Saved";
        showToast(`${action}! + ${Object.keys(byVendor).length} vendor expense${Object.keys(byVendor).length>1?"s":""} auto-created ✅`);
      } else {
        // No hire items — remove any old auto-created hires for this job
        setHires(updatedHires);
        cloudSave("hires",updatedHires);
        showToast(editing?"Job updated!":"Job saved!");
      }
    } else {
      const editing=modal.entry;
      const updatedHires=editing?hires.map(h=>h.id===entry.id?entry:h):[...hires,{...entry,id:genId()}];
      setHires(updatedHires);
      cloudSave("hires",updatedHires);
      showToast(editing?"Updated!":"Saved!");
    }
    setModal(null);
  }

  function delEntry(type,id){
    if(!window.confirm("Delete this entry?"))return;
    if(type==="income"){
      const updated=jobs.filter(j=>j.id!==id);
      setJobs(updated);
      cloudSave("jobs",updated);
    } else {
      const updated=hires.filter(h=>h.id!==id);
      setHires(updated);
      cloudSave("hires",updated);
    }
    showToast("Deleted");
  }

  // Month stats
  const mJobs  = jobs.filter(j=>j.date.startsWith(selMonth));
  const mHires = hires.filter(h=>h.date.startsWith(selMonth));
  const totalInc = mJobs.reduce((s,j)=>s+j.items.reduce((a,i)=>a+i.amount,0),0);
  const totalExp = mHires.reduce((s,h)=>s+h.items.reduce((a,i)=>a+i.amount,0),0);
  const netProfit= totalInc-totalExp;

  const IS={padding:"9px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,outline:"none",color:"#1a202c",background:"#fff",width:"100%"};

  // Entry cards renderer
  function EntryCard({entry,type}){
    const isIncome=type==="income";
    const eqList=isIncome?MY_EQ:VEN_EQ;
    const contactKey=isIncome?"clientId":"vendorId";
    const contacts=isIncome?clients:vendors;
    const contact=contacts.find(c=>c.id===entry[contactKey]);
    const total=entry.items.reduce((s,i)=>s+i.amount,0);
    const accent=isIncome?"#065f46":"#7c3aed";
    return(
      <div style={{background:"#fff",borderRadius:12,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",overflow:"hidden"}}>
        <div style={{background:isIncome?"linear-gradient(135deg,#f0fdf4,#dcfce7)":"linear-gradient(135deg,#faf5ff,#ede9fe)",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontWeight:700,color:accent,fontSize:14}}>{contact?.name||"Unknown"}</span>
            <span style={{fontSize:12,color:"#4a5568"}}>📅 {fmtD(entry.date)}</span>
            {entry.programme&&<span style={{fontSize:12,fontWeight:600,color:"#1a202c"}}>🎬 {entry.programme}</span>}
            {entry.location&&<span style={{fontSize:12,color:"#718096"}}>📍 {entry.location}</span>}
            {entry.addedBy==="member"&&<span style={{fontSize:11,background:"#fef3c7",color:"#c05621",border:"1px solid #f6ad55",borderRadius:5,padding:"2px 7px",fontWeight:700}}>👤 Staff</span>}
            {entry.autoCreated&&<span style={{fontSize:11,background:"#faf5ff",color:"#7c3aed",border:"1px solid #e9d5ff",borderRadius:5,padding:"2px 7px",fontWeight:700}}>🤝 Auto</span>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:16,fontWeight:800,color:accent,fontFamily:"Georgia,serif"}}>{fmt(total)}</span>
            {isIncome&&<button onClick={()=>generateJobPDF(entry,contact?.name||"Client",MY_EQ)} style={{padding:"4px 10px",background:"#f0fdf4",color:"#065f46",border:"1px solid #bbf7d0",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:600}}>📄 PDF</button>}
            <button onClick={()=>setModal({type,entry})} style={{padding:"4px 10px",background:"#ebf8ff",color:"#2b6cb0",border:"1px solid #bee3f8",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:600}}>Edit</button>
            <button onClick={()=>delEntry(type,entry.id)} style={{padding:"4px 10px",background:"#fff5f5",color:"#c53030",border:"1px solid #fed7d7",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:600}}>Del</button>
          </div>
        </div>
        <div style={{padding:"10px 16px 12px",display:"flex",flexWrap:"wrap",gap:6}}>
          {entry.items.map((item,i)=>{
            const eq=eqList.find(e=>e.id===item.equipmentId);
            return <div key={i} style={{background:isIncome?"#f0fdf4":"#faf5ff",border:`1px solid ${isIncome?"#bbf7d0":"#e9d5ff"}`,borderRadius:6,padding:"5px 10px",fontSize:12}}><span style={{fontWeight:600,color:"#1a202c"}}>{item.customName||eq?.name||'Other'}</span><span style={{color:"#718096",marginLeft:4}}>×{item.qty}</span><span style={{color:accent,fontWeight:700,marginLeft:6}}>{fmt(item.amount)}</span></div>;
          })}
          {entry.notes&&<div style={{width:"100%",marginTop:4,fontSize:11,color:"#a0aec0"}}>📝 {entry.notes}</div>}
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:"#f0f2f5"}}>

      {/* Sidebar (desktop) */}
      <div className="sidebar no-print" style={{position:"fixed",left:0,top:0,bottom:0,width:230,background:"linear-gradient(180deg,#0d1b2a,#1a0533)",display:"flex",flexDirection:"column",padding:"22px 12px",zIndex:100}}>
        <div style={{paddingLeft:10,marginBottom:28}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#fff",fontWeight:800}}>Templecity Entertainment</div>
          <div style={{fontSize:10,color:"#4a5568",letterSpacing:"2px",textTransform:"uppercase",marginTop:4}}>Equipment Rental Manager</div>
        </div>
        {[["dashboard","📊","Dashboard"],["income","💰","Income (Clients)"],["expense","💸","Expense (Vendors)"],["reports","📑","Monthly Reports"],["contacts","👥","Contacts"]].map(([k,ic,lb])=>(
          <button key={k} onClick={()=>{
            setView(k);
            if(k==="income"&&newStaffCount>0){
              const total=jobs.filter(j=>j.addedBy==="member").length;
              localStorage.setItem("ll_lastSeenJobs",String(total));
              setLastSeenJobs(total);
              setNewStaffCount(0);
              setShowStaffBanner(false);
            }
          }} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",textAlign:"left",padding:"11px 14px",marginBottom:4,background:view===k?"rgba(255,255,255,0.13)":"transparent",border:view===k?"1px solid rgba(196,181,253,0.3)":"1px solid transparent",borderRadius:10,color:view===k?"#c4b5fd":"#718096",cursor:"pointer",fontSize:14,fontWeight:view===k?"700":"400"}}>

                          <div style={{borderTop:"1.5px solid #e2e8f0",paddingTop:10}}>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                              <span style={{color:"#4a5568"}}>This month</span>
                              <span style={{fontWeight:600}}>{fmt(amt)}</span>
                            </div>
                            {prev>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                              <span style={{color:"#c05621"}}>⏳ Prev due</span>
                              <span style={{fontWeight:600,color:"#c05621"}}>{fmt(prev)}</span>
                            </div>}
                            {paid>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                              <span style={{color:"#065f46"}}>✅ Received</span>
                              <span style={{fontWeight:600,color:"#065f46"}}>− {fmt(paid)}</span>
                            </div>}
                            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:balance<=0?"#f0fdf4":"#fff5f5",borderRadius:8,marginTop:6}}>
                              <span style={{fontSize:14,fontWeight:700,color:balance<=0?"#065f46":"#c53030"}}>Balance</span>
                              <span style={{fontSize:16,fontWeight:800,color:balance<=0?"#065f46":"#c53030",fontFamily:"Georgia,serif"}}>{balance<=0?"✅ Cleared":fmt(balance)}</span>
                            </div>
                          </div>
                          {/* Download PDF */}
                          <button onClick={()=>generatePDF(c,jobs.filter(j=>j.clientId===c.id&&j.date.startsWith(selMonth)),prev,paid,balance,selMonth)}
                            style={{width:"100%",padding:"9px",background:"linear-gradient(135deg,#0d1b2a,#1b4332)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,marginTop:12}}>
                            ⬇️ Download Client PDF
                          </button>
                        </div>
                      </div>
                    );
                  })}
                  {clients.length===0&&<div style={{background:"#fff",borderRadius:12,padding:50,textAlign:"center",color:"#a0aec0",fontSize:14,gridColumn:"1/-1"}}>No clients yet. Add clients in Contacts tab.</div>}
                </div>
              </div>
            )}

            {/* ── VENDOR REPORTS ── */}
            {reportType==="vendor"&&(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
                  {vendors.map(v=>{
                    const vh=hires.filter(h=>h.vendorId===v.id&&h.date.startsWith(selMonth));
                    const totalAmt=vh.reduce((s,h)=>s+h.items.reduce((a,i)=>a+i.amount,0),0);
                    const prev=vDues[v.id]||0;
                    const advList=(advances||[]).filter(a=>a.contactId===v.id&&a.date.startsWith(selMonth));
                    const totalAdv=advList.reduce((s,a)=>s+a.amount,0);
                    const vpList=(vendorPays||[]).filter(p=>p.contactId===v.id&&p.date.startsWith(selMonth));
                    const totalVPaid=vpList.reduce((s,p)=>s+p.amount,0);
                    const balance=totalAmt+prev-totalAdv-totalVPaid;
                    // Count days per item
                    const itemDays={};
                    vh.forEach(h=>h.items.forEach(it=>{
                      const eq=VEN_EQ.find(e=>e.id===it.equipmentId);
                      const nm=it.customName||eq?.name||it.equipmentId;
                      itemDays[nm]=(itemDays[nm]||0)+it.qty;
                    }));
                    return(
                      <div key={v.id} style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
                        {/* Header */}
                        <div style={{background:"linear-gradient(135deg,#1a0533,#7c3aed)",padding:"16px 18px",color:"#fff"}}>
                          <div style={{fontWeight:800,fontSize:16}}>{v.name}</div>
                          <div style={{fontSize:12,color:"#ddd6fe",marginTop:2}}>{v.phone||v.email||"No contact"}</div>
                        </div>
                        <div style={{padding:"16px 18px"}}>
                          {/* Work summary */}
                          {Object.keys(itemDays).length>0?(
                            <div style={{marginBottom:14}}>
                              <div style={{fontSize:12,fontWeight:700,color:"#4a5568",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>Days Worked This Month</div>
                              {Object.entries(itemDays).map(([nm,days])=>(
                                <div key={nm} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#faf5ff",borderRadius:7,marginBottom:5,border:"1px solid #e9d5ff"}}>
                                  <span style={{fontSize:13,fontWeight:600,color:"#1a202c"}}>{nm}</span>
                                  <span style={{fontSize:13,fontWeight:800,color:"#7c3aed"}}>{days} day{days>1?"s":""}</span>
                                </div>
                              ))}
                            </div>
                          ):(
                            <div style={{textAlign:"center",padding:"12px 0",color:"#a0aec0",fontSize:13,marginBottom:8}}>No hires this month</div>
                          )}

                          {/* Hire entries detail */}
                          {vh.length>0&&(
                            <div style={{marginBottom:14}}>
                              <div style={{fontSize:12,fontWeight:700,color:"#4a5568",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>Hire Details</div>
                              {vh.map(hire=>{
                                const hAmt=hire.items.reduce((s,i)=>s+i.amount,0);
                                return(
                                  <div key={hire.id} style={{padding:"8px 10px",background:"#f7fafc",borderRadius:7,marginBottom:5,borderLeft:"3px solid #7c3aed"}}>
                                    <div style={{display:"flex",justifyContent:"space-between"}}>
                                      <span style={{fontSize:12,fontWeight:700,color:"#1a202c"}}>{hire.date}</span>
                                      <span style={{fontSize:12,fontWeight:800,color:"#7c3aed"}}>{fmt(hAmt)}</span>
                                    </div>
                                    {hire.programme&&<div style={{fontSize:11,color:"#4a5568",marginTop:2}}>🎬 {hire.programme}</div>}
                                    {hire.location&&<div style={{fontSize:11,color:"#718096"}}>📍 {hire.location}</div>}
                                  </div>
                                );
                              })}
                            </div>
                          )}

                          {/* Advances */}
                          {advList.length>0&&(
                            <div style={{marginBottom:14}}>
                              <div style={{fontSize:12,fontWeight:700,color:"#c05621",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>💸 Advances Given</div>
                              {advList.map(a=>(
                                <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#fffbeb",borderRadius:7,marginBottom:5,border:"1px solid #fde68a"}}>
                                  <div>
                                    <div style={{fontSize:12,fontWeight:700,color:"#92400e"}}>{a.date}</div>
                                    {a.note&&<div style={{fontSize:11,color:"#c05621"}}>{a.note}</div>}
                                  </div>
                                  <span style={{fontSize:13,fontWeight:800,color:"#c05621"}}>{fmt(a.amount)}</span>
                                </div>
                              ))}
                              <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:"#fef3c7",borderRadius:6,marginTop:4}}>
                                <span style={{fontSize:12,fontWeight:600,color:"#92400e"}}>Total Advanced</span>
                                <span style={{fontSize:13,fontWeight:800,color:"#c05621"}}>{fmt(totalAdv)}</span>
                              </div>
                            </div>
                          )}

                          {/* Payments Made */}
                          {vpList.length>0&&(
                            <div style={{marginBottom:14}}>
                              <div style={{fontSize:12,fontWeight:700,color:"#065f46",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>✅ Payments Made</div>
                              {vpList.map(p=>(
                                <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#f0fdf4",borderRadius:7,marginBottom:5,border:"1px solid #bbf7d0"}}>
                                  <div>
                                    <div style={{fontSize:12,fontWeight:700,color:"#065f46"}}>📅 {p.date}</div>
                                    {p.note&&<div style={{fontSize:11,color:"#4a5568"}}>{p.note}</div>}
                                  </div>
                                  <span style={{fontSize:13,fontWeight:800,color:"#065f46"}}>{fmt(p.amount)}</span>
                                </div>
                              ))}
                              <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:"#dcfce7",borderRadius:6,marginTop:4}}>
                                <span style={{fontSize:12,fontWeight:600,color:"#065f46"}}>Total Paid</span>
                                <span style={{fontSize:13,fontWeight:800,color:"#065f46"}}>{fmt(totalVPaid)}</span>
                              </div>
                            </div>
                          )}

                          {/* Financial summary */}
                          <div style={{borderTop:"1.5px solid #e2e8f0",paddingTop:10}}>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                              <span style={{color:"#4a5568"}}>This month</span>
                              <span style={{fontWeight:600}}>{fmt(totalAmt)}</span>
                            </div>
                            {prev>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                              <span style={{color:"#c05621"}}>⏳ Prev due</span>
                              <span style={{fontWeight:600,color:"#c05621"}}>{fmt(prev)}</span>
                            </div>}
                            {totalAdv>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                              <span style={{color:"#c05621"}}>💸 Advances</span>
                              <span style={{fontWeight:600,color:"#c05621"}}>− {fmt(totalAdv)}</span>
                            </div>}
                            {totalVPaid>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                              <span style={{color:"#065f46"}}>✅ Paid</span>
                              <span style={{fontWeight:600,color:"#065f46"}}>− {fmt(totalVPaid)}</span>
                            </div>}
                            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:balance<=0?"#f0fdf4":"#faf5ff",borderRadius:8,marginTop:6}}>
                              <span style={{fontSize:14,fontWeight:700,color:balance<=0?"#065f46":"#7c3aed"}}>I Still Owe</span>
                              <span style={{fontSize:16,fontWeight:800,color:balance<=0?"#065f46":"#7c3aed",fontFamily:"Georgia,serif"}}>{balance<=0?"✅ Settled":fmt(balance)}</span>
                            </div>
                          </div>

                          {/* Download PDF */}
                          <button onClick={()=>generateVendorReportPDF(v,vh,advList,prev,totalAdv+totalVPaid,balance,selMonth)}
                            style={{width:"100%",padding:"9px",background:"linear-gradient(135deg,#1a0533,#7c3aed)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,marginTop:12}}>
                            ⬇️ Download Vendor PDF
                          </button>
                        </div>
                      </div>
                    );
                  })}
                  {vendors.length===0&&<div style={{background:"#fff",borderRadius:12,padding:50,textAlign:"center",color:"#a0aec0",fontSize:14,gridColumn:"1/-1"}}>No vendors yet. Add vendors in Contacts tab.</div>}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── CONTACTS ── */}
        {view==="contacts"&&(
          <div>
            <h1 className="page-title" style={{fontFamily:"'Playfair Display',serif",fontSize:32,color:"#0d1b2a",fontWeight:800,marginBottom:22}}>Contacts</h1>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              {/* Clients */}
              <div>
                <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",marginBottom:14}}>
                  <h3 style={{fontSize:14,fontWeight:700,color:"#065f46",marginBottom:12}}>➕ Add Client</h3>
                  <div style={{display:"flex",flexDirection:"column",gap:9}}>
                    <input placeholder="Name *" value={newC.name} onChange={e=>setNewC(p=>({...p,name:e.target.value}))} style={IS}/>
                    <input type="email" placeholder="Email" value={newC.email} onChange={e=>setNewC(p=>({...p,email:e.target.value}))} style={IS}/>
                    <input placeholder="Phone" value={newC.phone} onChange={e=>setNewC(p=>({...p,phone:e.target.value}))} style={IS}/>
                  </div>
                  <button onClick={()=>addContact("client")} style={{marginTop:10,padding:"9px 20px",background:"linear-gradient(135deg,#0d1b2a,#1b4332)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700}}>Add Client</button>
                </div>
                <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
                  <h3 style={{fontSize:14,fontWeight:700,color:"#065f46",marginBottom:12}}>Clients ({clients.length})</h3>
                  {clients.length===0&&<div style={{textAlign:"center",padding:24,color:"#a0aec0",fontSize:13}}>No clients yet</div>}
                  {clients.map(c=>(
                    <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderRadius:8,background:"#f0fdf4",marginBottom:7}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13,color:"#1a202c"}}>{c.name}</div>
                        <div style={{fontSize:11,color:"#718096"}}>{c.email||"—"}{c.phone&&` · ${c.phone}`}</div>
                      </div>
                      <button onClick={()=>{if(window.confirm("Remove?")){const u=clients.filter(x=>x.id!==c.id);setClients(u);cloudSave("clients",u);}}} style={{padding:"4px 10px",background:"#fff5f5",color:"#c53030",border:"1px solid #fed7d7",borderRadius:5,cursor:"pointer",fontSize:11}}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
              {/* Vendors */}
              <div>
                <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",marginBottom:14}}>
                  <h3 style={{fontSize:14,fontWeight:700,color:"#7c3aed",marginBottom:12}}>➕ Add Vendor</h3>
                  <div style={{display:"flex",flexDirection:"column",gap:9}}>
                    <input placeholder="Name *" value={newV.name} onChange={e=>setNewV(p=>({...p,name:e.target.value}))} style={IS}/>
                    <input type="email" placeholder="Email" value={newV.email} onChange={e=>setNewV(p=>({...p,email:e.target.value}))} style={IS}/>
                    <input placeholder="Phone" value={newV.phone} onChange={e=>setNewV(p=>({...p,phone:e.target.value}))} style={IS}/>
                  </div>
                  <button onClick={()=>addContact("vendor")} style={{marginTop:10,padding:"9px 20px",background:"linear-gradient(135deg,#1a0533,#7c3aed)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700}}>Add Vendor</button>
                </div>
                <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
                  <h3 style={{fontSize:14,fontWeight:700,color:"#7c3aed",marginBottom:12}}>Vendors ({vendors.length})</h3>
                  {vendors.length===0&&<div style={{textAlign:"center",padding:24,color:"#a0aec0",fontSize:13}}>No vendors yet</div>}
                  {vendors.map(v=>(
                    <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderRadius:8,background:"#faf5ff",marginBottom:7}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13,color:"#1a202c"}}>{v.name}</div>
                        <div style={{fontSize:11,color:"#718096"}}>{v.email||"—"}{v.phone&&` · ${v.phone}`}</div>
                      </div>
                      <button onClick={()=>{if(window.confirm("Remove?")){const u=vendors.filter(x=>x.id!==v.id);setVendors(u);cloudSave("vendors",u);}}} style={{padding:"4px 10px",background:"#fff5f5",color:"#c53030",border:"1px solid #fed7d7",borderRadius:5,cursor:"pointer",fontSize:11}}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Equipment rates reference */}
            <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",marginTop:18}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#1a202c",marginBottom:12}}>📦 My Equipment & Daily Rates</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:8}}>
                {MY_EQ.map(e=>(
                  <div key={e.id} style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:7,padding:"8px 12px",display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:13,fontWeight:600,color:"#1a202c"}}>{e.name}</span>
                    <span style={{fontSize:13,fontWeight:800,color:"#065f46"}}>{fmt(e.rate)}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Modals */}
      {modal&&(
        <EntryModal
          type={modal.type}
          contacts={modal.type==="income"?clients:vendors}
          editEntry={modal.entry||null}
          onSave={entry=>saveEntry(modal.type,entry)}
          onClose={()=>setModal(null)}
          vendors={vendors}
        />
      )}
      {billModal&&(
        <BillModal
          type={billModal.type}
          contact={billModal.contact}
          entries={billModal.type==="income"?jobs:hires}
          prevDues={billModal.type==="income"?cDues:vDues}
          onSavePrevDue={(id,amt)=>billModal.type==="income"?setCDues(p=>({...p,[id]:amt})):setVDues(p=>({...p,[id]:amt}))}
          month={selMonth}
          onClose={()=>setBillModal(null)}
          payments={payments}
          onAddPayment={p=>setPayments(prev=>[...prev,p])}
          onDelPayment={id=>setPayments(prev=>prev.filter(p=>p.id!==id))}
          advances={advances}
          onAddAdvance={a=>setAdvances(prev=>[...prev,a])}
          onDelAdvance={id=>setAdvances(prev=>prev.filter(a=>a.id!==id))}
          vendorPays={vendorPays}
          onAddVendorPay={p=>{const u=[...vendorPays,p];setVendorPays(u);cloudSave("vendorPays",u);}}
          onDelVendorPay={id=>{const u=vendorPays.filter(p=>p.id!==id);setVendorPays(u);cloudSave("vendorPays",u);}}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>



<script>
// ── Service Worker registration ───────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('✅ SW registered'))
      .catch(err => console.log('SW error:', err));
  });
}

// ── PWA Install Prompt ────────────────────────────────────────────────────────
let deferredPrompt;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('dismiss-btn');

window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  // Show immediately - don't wait
  banner.classList.add('show');
  console.log('✅ Install prompt ready');
});

installBtn.addEventListener('click', async ()=>{
  banner.classList.remove('show');
  if(deferredPrompt){
    deferredPrompt.prompt();
    const {outcome} = await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
});

dismissBtn.addEventListener('click', ()=>banner.classList.remove('show'));
window.addEventListener('appinstalled', ()=>banner.classList.remove('show'));
</script>
</body>
</html>
